  <!-- Security headers via meta (supplement server-level headers) -->
  <!--
    CSP notes:
    - script-src 'unsafe-inline': required for the inline PWA manifest loader and
      MutationObserver scripts in this file. Replace with nonce-based CSP when build
      tooling supports it.
    - connect-src https: wss:: Traccar server URLs are client-configured (unknown at
      build time). Supabase edge functions also vary. Broad https/wss is required.
    - img-src https: blob: data:: map tiles come from Google/Bing/OSM/Mapbox etc.
    - frame-ancestors 'none': equivalent to X-Frame-Options DENY (supported in meta CSP).
      Also add X-Frame-Options: DENY at the CDN/hosting level for older browser support.
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' https://cdn.onesignal.com https://*.onesignal.com;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.onesignal.com;
    font-src 'self' https://fonts.gstatic.com;
    img-src 'self' data: blob: https:;
    connect-src 'self' https: wss:;
    worker-src 'self' blob:;
    manifest-src 'self' blob:;
    frame-src 'none';
    base-uri 'self';
    form-action 'self';
    object-src 'none';
  ">

  <link id="apple-icon" rel="apple-touch-icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAACklEQVR4nGMAAQAABQABDQottAAAAABJRU5ErkJggg==" sizes="180x180" />

  <link id="pwa-manifest" rel="manifest" href="/manifest.webmanifest" />
  <script>
    // Early Branding & Dynamic PWA Manifest to preserve Tenant context
    (function() {
      const params = new URLSearchParams(window.location.search);
      const tenant = params.get('tenant') || localStorage.getItem('tenantSlug') || 'mabtracker';
      const cachedLogo = localStorage.getItem('tenantLogo');
      const cachedName = localStorage.getItem('tenantName');
      
      if (params.get('tenant')) {
        localStorage.setItem('tenantSlug', params.get('tenant'));
      }

      // 1. Immediate Branding Application (avoid Traccar flash)
      if (cachedLogo) {
        document.getElementById('favicon').href = cachedLogo;
        document.getElementById('apple-icon').href = cachedLogo;
      }
      if (cachedName) {
        document.title = cachedName;
      }

      // 2. Dynamic PWA Manifest Injection
      const manifestLink = document.getElementById('pwa-manifest');
      if (manifestLink) {
        const originalHref = manifestLink.getAttribute('href');
        fetch(originalHref)
          .then(response => response.json())
          .then(manifest => {
            const connector = manifest.start_url.includes('?') ? '&' : '?';
            manifest.start_url = `${manifest.start_url}${connector}tenant=${tenant}`;
            manifest.id = manifest.start_url;
            
            // Inject tenant branding into manifest icons if available
            if (cachedLogo) {
              manifest.name = cachedName || manifest.name;
              manifest.short_name = cachedName ? (cachedName.length > 12 ? cachedName.slice(0, 11) + '…' : cachedName) : manifest.short_name;
              manifest.icons = [
                { src: cachedLogo, sizes: '192x192', type: 'image/png', purpose: 'any' },
                { src: cachedLogo, sizes: '512x512', type: 'image/png', purpose: 'any maskable' }
              ];
            }
            
            const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
            const manifestUrl = URL.createObjectURL(blob);
            manifestLink.setAttribute('href', manifestUrl);
            console.log('PWA: Dynamic manifest loaded for tenant:', tenant);
          })
          .catch(err => console.error('PWA: Failed to load/modify manifest:', err));
      }
    })();

    // Early capture of Install Prompt to avoid missing it
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      window.deferredPwaPrompt = e;
      console.log('PWA: Captured beforeinstallprompt early in index.html');
      // Dispatch custom event for hooks to react immediately
      window.dispatchEvent(new CustomEvent('pwa-prompt-available'));
    });
    
    window.addEventListener('appinstalled', () => {
      window.deferredPwaPrompt = null;
      console.log('PWA: App installed event captured early');
    });
  </script>

      aspect-ratio: 1;

      border-radius: 50%;
      border: 4px solid #333;
      border-right-color: #39ff14;
    }

    @keyframes ll {
      to {
        transform: rotate(1turn)
      }
    }
  </style>

  <noscript>Enable JavaScript to use <a href="https://www.traccar.org/">Traccar GPS Tracking System</a>.</noscript>
  <div id="root" class="root"></div>
  <div class="loader"></div>
  <script type="module" src="/src/index.jsx" onerror="alert('Loading error.')"></script>
  <script>
    // Hide the initial loader once React mounts
    const observer = new MutationObserver(() => {
      if (document.getElementById('root')?.children.length > 0) {
        const loader = document.querySelector('.loader');
        if (loader) loader.style.display = 'none';
        observer.disconnect();
      }
    });
    observer.observe(document.getElementById('root'), { childList: true });
  </script>
