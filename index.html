  <link id="pwa-manifest" rel="manifest" href="/manifest.webmanifest" />
  <script>
    // Dynamic PWA Manifest to preserve Tenant context
    (function() {
      const params = new URLSearchParams(window.location.search);
      const tenant = params.get('tenant') || localStorage.getItem('tenantSlug') || 'mabtracker';
      
      if (params.get('tenant')) {
        localStorage.setItem('tenantSlug', params.get('tenant'));
      }

      const manifestLink = document.getElementById('pwa-manifest');
      if (manifestLink) {
        // Use the actual manifest URL from the link
        const originalHref = manifestLink.getAttribute('href');
        fetch(originalHref)
          .then(response => response.json())
          .then(manifest => {
            // Update start_url and id with tenant context to ensure it opens in the right place
            const connector = manifest.start_url.includes('?') ? '&' : '?';
            manifest.start_url = `${manifest.start_url}${connector}tenant=${tenant}`;
            // Keep ID stable but prefixed with tenant for unique app per tenant if desired
            // or keep it same as start_url for direct matching
            manifest.id = manifest.start_url;
            
            const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
            const manifestUrl = URL.createObjectURL(blob);
            manifestLink.setAttribute('href', manifestUrl);
            console.log('PWA: Dynamic manifest loaded for tenant:', tenant);
          })
          .catch(err => console.error('PWA: Failed to load/modify manifest:', err));
      }
    })();

    // Early capture of Install Prompt to avoid missing it
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      window.deferredPwaPrompt = e;
      console.log('PWA: Captured beforeinstallprompt early in index.html');
      // Dispatch custom event for hooks to react immediately
      window.dispatchEvent(new CustomEvent('pwa-prompt-available'));
    });
    
    window.addEventListener('appinstalled', () => {
      window.deferredPwaPrompt = null;
      console.log('PWA: App installed event captured early');
    });
  </script>

      border-right-color: #39ff14;
    }

    @keyframes ll {
      to {
        transform: rotate(1turn)
      }
    }
  </style>

<body>
  <noscript>Enable JavaScript to use <a href="https://www.traccar.org/">Traccar GPS Tracking System</a>.</noscript>
  <div id="root" class="root"></div>
  <div class="loader"></div>
  <script type="module" src="/src/index.jsx" onerror="alert('Loading error.')"></script>
  <script>
    // Hide the initial loader once React mounts
    const observer = new MutationObserver(() => {
      if (document.getElementById('root')?.children.length > 0) {
        const loader = document.querySelector('.loader');
        if (loader) loader.style.display = 'none';
        observer.disconnect();
      }
    });
    observer.observe(document.getElementById('root'), { childList: true });
  </script>
